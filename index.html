<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер воды</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f8fb;
    text-align:center;
    padding:40px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    color:#2196f3;
}

.water{
    font-size:60px;
    margin:20px 0;
}

.progress{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.bar{
    width:0%;
    height:100%;
    background:#2196f3;
    transition:.3s;
}

button{
    background:#2196f3;
    color:white;
    border:none;
    padding:15px 20px;
    margin:5px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976d2;
}

.reset{
    background:#f44336;
}

.reset:hover{
    background:#d32f2f;
}
</style>
</head>

<body>


<h1 id="amount">0 мл</h1>

<div class="progress">
    <div id="progress"></div>
</div>

<p id="progress-text">0 / 2000 мл</p>
</div>
<script>
let water = Number(localStorage.getItem("water")) || 0;
const goal = 2000;

const amountText = document.getElementById("amount");
const progressBar = document.getElementById("progress");
const progressText = document.getElementById("progress-text");

function updateScreen() {
  amountText.textContent = water + " мл";
  progressText.textContent = water + " / " + goal + " мл";

  let percent = (water / goal) * 100;
  if (percent > 100) percent = 100;

  progressBar.style.width = percent + "%";

  localStorage.setItem("water", water);
}

function addWater(amount) {
  water += amount;
  updateScreen();
}

function resetWater() {
  water = 0;
  updateScreen();
}

updateScreen();
</script>

</body>
</html>
